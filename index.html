<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.166.0/build/three.module.js",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

/* ============ iPad ダブルタップズーム / ピンチ / バウンス防止 ============ */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

/* ============ 定数 ============ */
const CELL = 2;
const WALL_H = 0.8;
const WALL_T = 0.4;   // 壁の厚み（薄くして通路を広く見せる）
const BALL_R = 0.55;  // ボール半径（大きめ）
const GOAL_R = 0.7;
const MAX_TILT_G = 6.2;
const TILT_LIMIT_DEG = 24;

/* ============ 障害物パラメータ ============ */
const OBST = {
  slideWallH: 1.2,        // スライド壁の高さ（通常壁0.8より高くして乗り越え防止）
  slideWallThick: 0.5,
  slideSpeed: 1.15,       // 往復の角速度(rad/s)
  windForce: 10,          // 風の力(N)
  windZoneR: 1.25,        // 風ゾーン半径
  bounceR: 0.95,          // バウンドパッド半径
  bounceImpulse: 5.0,     // 跳ね上げ力積（上向き）
  bounceCarry: 0.2,       // 水平速度の引き継ぎ率
  bounceCooldown: 0.6,    // 再発動までの秒数
  bladeArmLen: 1.5,       // 羽根の腕の長さ（中心から先端まで）
  bladeArmThick: 0.5,     // 羽根の厚み（すり抜け防止のため厚め）
  bladeArmH: 1.1,
  bladeOmega: 1.6,        // 羽根の回転角速度(rad/s)
};

/* ============ レベルデータ ============ */
// '#'=壁 '.'=通路 'S'=スタート 'G'=ゴール
const LEVEL1_ROWS = [
  "###########",
  "#S.......G#",
  "###########",
];

const LEVEL2_ROWS = [
  "#########",
  "#S......#",
  "#######.#",
  "#.......#",
  "#.#######",
  "#......G#",
  "#########",
];

// 指定セルから到達可能な通路セルをBFSで全列挙する（迷路生成・ゴール配置の妥当性確認に使用）
function bfsReachable(g, h, w, sr, sc) {
  const seen = Array.from({ length: h }, () => Array(w).fill(false));
  seen[sr][sc] = true;
  const queue = [[sr, sc]];
  const order = [[sr, sc]];
  while (queue.length) {
    const [r, c] = queue.shift();
    for (const [dr, dc] of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < h && nc >= 0 && nc < w && g[nr][nc] !== '#' && !seen[nr][nc]) {
        seen[nr][nc] = true;
        queue.push([nr, nc]);
        order.push([nr, nc]);
      }
    }
  }
  return order;
}

function buildFreeLevel(h, w, randomizeGoal) {
  // 外周だけ壁、内部はすべて通路の自由な広場
  const g = Array.from({ length: h }, (_, r) =>
    Array.from({ length: w }, (_, c) =>
      (r === 0 || r === h - 1 || c === 0 || c === w - 1) ? '#' : '.'
    )
  );
  const startR = 1, startC = 1;
  let goalR = h - 2, goalC = w - 2;
  if (randomizeGoal) {
    const reachable = bfsReachable(g, h, w, startR, startC);
    const minDist = Math.floor((h + w) / 3); // スタートに近すぎるゴールを避ける
    const candidates = reachable.filter(([r, c]) => Math.abs(r - startR) + Math.abs(c - startC) >= minDist);
    const pool = candidates.length > 0 ? candidates : reachable;
    [goalR, goalC] = pool[Math.floor(Math.random() * pool.length)];
  }
  g[startR][startC] = 'S';
  g[goalR][goalC] = 'G';
  return g.map(row => row.join(''));
}

const LEVELS = [
  { name: 'レベル1：シンプル', rows: LEVEL1_ROWS, cellSize: 2.05 }, // 通路幅 ≈ 玉の1.5倍
  { name: 'レベル2：ジグザグ', rows: LEVEL2_ROWS, cellSize: 2.6 },  // 通路幅 ≈ 玉の2.0倍
  { name: 'レベル3：フリー', rows: () => buildFreeLevel(9, 13, true) }, // ゴール位置は毎回ランダム
  { name: 'レベル4：フリー＋動く壁・風ゾーン', rows: () => buildFreeLevel(9, 13, true) },
  { name: 'レベル5：フリー＋跳ね返し・回転羽根', rows: () => buildFreeLevel(9, 13, true) },
];

function parseLevel(rows) {
  const h = rows.length, w = rows[0].length;
  let start = null, goal = null;
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const ch = rows[r][c];
      if (ch === 'S') start = [r, c];
      if (ch === 'G') goal = [r, c];
    }
  }
  const isWall = (r, c) => {
    if (r < 0 || r >= h || c < 0 || c >= w) return true; // 範囲外は壁扱い
    return rows[r][c] === '#';
  };
  return { h, w, isWall, start, goal };
}
function gridToWorld(r, c, h, w, cellSize) {
  return {
    x: (c - (w - 1) / 2) * cellSize,
    z: (r - (h - 1) / 2) * cellSize,
  };
}

/* ============ Three.js セットアップ ============ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd8e8);
scene.fog = new THREE.Fog(0x9fd8e8, 18, 46);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);

const hemi = new THREE.HemisphereLight(0xffffff, 0x445566, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(6, 12, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 40;
sun.shadow.camera.left = -14; sun.shadow.camera.right = 14;
sun.shadow.camera.top = 14; sun.shadow.camera.bottom = -14;
scene.add(sun);

function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

/* ============ Cannon-es セットアップ ============ */
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;

const groundMat = new CANNON.Material('ground');
const ballMat = new CANNON.Material('ball');
const bladeMat = new CANNON.Material('blade');
world.addContactMaterial(new CANNON.ContactMaterial(groundMat, ballMat, {
  friction: 0.45, restitution: 0.15,
}));
// 羽根に当たったときは弾かれる感触を強めにする
world.addContactMaterial(new CANNON.ContactMaterial(bladeMat, ballMat, {
  friction: 0.1, restitution: 0.45,
}));

/* ============ ボール ============ */
const ballGeo = new THREE.SphereGeometry(BALL_R, 32, 24);
const ballTexMat = new THREE.MeshStandardMaterial({ color: 0xff5252, metalness: 0.35, roughness: 0.35 });
const ballMesh = new THREE.Mesh(ballGeo, ballTexMat);
ballMesh.castShadow = true;
scene.add(ballMesh);

const ballBody = new CANNON.Body({
  mass: 1,
  shape: new CANNON.Sphere(BALL_R),
  material: ballMat,
  linearDamping: 0.35,
  angularDamping: 0.2,
});
world.addBody(ballBody);
// 高速で移動したときに薄い羽根や壁をすり抜けないよう連続衝突判定を有効化
ballBody.ccdSpeedThreshold = 3;
ballBody.ccdSweptSphereRadius = BALL_R * 0.9;

/* ============ ゴールマーカー ============ */
const goalGeo = new THREE.TorusGeometry(GOAL_R, 0.08, 12, 32);
const goalMat = new THREE.MeshStandardMaterial({ color: 0xffd23f, emissive: 0xffb800, emissiveIntensity: 0.6 });
const goalMesh = new THREE.Mesh(goalGeo, goalMat);
goalMesh.rotation.x = Math.PI / 2;
scene.add(goalMesh);

/* ============ レベル構築 ============ */
let currentLevelGroup = null;
let currentLevelInfo = null;
let activeObstacles = [];   // 現在のレベルの動く障害物（毎フレームupdateされる）
let goalWorld = { x: 0, z: 0 };
let startWorld = { x: 0, z: 0 };

function clearLevel() {
  if (currentLevelGroup) {
    scene.remove(currentLevelGroup);
    currentLevelGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); });
  }
  if (currentLevelInfo) {
    currentLevelInfo.bodies.forEach(b => world.removeBody(b));
  }
  activeObstacles = []; // 前レベルの障害物のupdateが残らないよう必ずクリア
}

function buildLevel(index) {
  clearLevel();
  const levelDef = LEVELS[index];
  const rows = typeof levelDef.rows === 'function' ? levelDef.rows() : levelDef.rows;
  const cellSize = levelDef.cellSize || CELL;
  const info = parseLevel(rows);
  const group = new THREE.Group();
  const bodies = [];

  // 床
  const floorW = info.w * cellSize, floorH = info.h * cellSize;
  const floorGeo = new THREE.BoxGeometry(floorW, 0.4, floorH);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x2f7d5b, roughness: 0.9 });
  const floorMesh = new THREE.Mesh(floorGeo, floorMat);
  floorMesh.position.set(0, -0.2, 0);
  floorMesh.receiveShadow = true;
  group.add(floorMesh);

  const floorBody = new CANNON.Body({ mass: 0, material: groundMat });
  floorBody.addShape(new CANNON.Box(new CANNON.Vec3(floorW / 2, 0.2, floorH / 2)));
  floorBody.position.set(0, -0.2, 0);
  world.addBody(floorBody);
  bodies.push(floorBody);

  // 壁：セルを塗りつぶすのではなく、通路と壁の「境界線」に薄い板を置く方式
  const wallSegs = [];
  for (let r = 0; r < info.h; r++) {
    for (let c = 0; c < info.w; c++) {
      if (rows[r][c] === '#') continue; // 通路セル側からのみ境界を判定する
      const { x, z } = gridToWorld(r, c, info.h, info.w, cellSize);
      // 角に隙間ができないよう、境界壁の長さをWALL_T分だけ延長して重ねる
      if (info.isWall(r - 1, c)) wallSegs.push({ x, z: z - cellSize / 2, lenX: cellSize + WALL_T, lenZ: WALL_T }); // 北
      if (info.isWall(r + 1, c)) wallSegs.push({ x, z: z + cellSize / 2, lenX: cellSize + WALL_T, lenZ: WALL_T }); // 南
      if (info.isWall(r, c - 1)) wallSegs.push({ x: x - cellSize / 2, z, lenX: WALL_T, lenZ: cellSize + WALL_T }); // 西
      if (info.isWall(r, c + 1)) wallSegs.push({ x: x + cellSize / 2, z, lenX: WALL_T, lenZ: cellSize + WALL_T }); // 東
    }
  }
  if (wallSegs.length > 0) {
    const wallGeo = new THREE.BoxGeometry(1, 1, 1); // 単位ボックス。インスタンスごとにスケールして使う
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xeee6d5, roughness: 0.85 });
    const wallMesh = new THREE.InstancedMesh(wallGeo, wallMat, wallSegs.length);
    wallMesh.castShadow = true;
    wallMesh.receiveShadow = true;
    const dummy = new THREE.Object3D();
    wallSegs.forEach((seg, i) => {
      dummy.position.set(seg.x, WALL_H / 2, seg.z);
      dummy.scale.set(seg.lenX, WALL_H, seg.lenZ);
      dummy.updateMatrix();
      wallMesh.setMatrixAt(i, dummy.matrix);

      const body = new CANNON.Body({ mass: 0, material: groundMat });
      body.addShape(new CANNON.Box(new CANNON.Vec3(seg.lenX / 2, WALL_H / 2, seg.lenZ / 2)));
      body.position.set(seg.x, WALL_H / 2, seg.z);
      world.addBody(body);
      bodies.push(body);
    });
    group.add(wallMesh);
  }

  // レベル4・5に動く障害物を配置する
  buildObstacles(index, rows, info, cellSize, group, bodies);

  scene.add(group);
  currentLevelGroup = group;
  currentLevelInfo = { ...info, bodies, cellSize };

  startWorld = gridToWorld(info.start[0], info.start[1], info.h, info.w, cellSize);
  goalWorld = gridToWorld(info.goal[0], info.goal[1], info.h, info.w, cellSize);
  goalMesh.position.set(goalWorld.x, 0.05, goalWorld.z);

  ballBody.position.set(startWorld.x, BALL_R + 0.05, startWorld.z);
  ballBody.velocity.set(0, 0, 0);
  ballBody.angularVelocity.set(0, 0, 0);
  ballBody.quaternion.set(0, 0, 0, 1);

  // カメラの見下ろし距離をコース規模に合わせる
  camOffsetDist = Math.max(8, Math.max(floorW, floorH) * 0.55);
}

/* ============ 障害物システム ============ */
// スタート・ゴールと重ならない配置候補を、互いに一定距離あけて貪欲に選ぶ
function pickSpread(cells, count, minCellDist, avoid) {
  const chosen = [];
  const shuffled = cells.slice().sort(() => Math.random() - 0.5);
  for (const cell of shuffled) {
    if (chosen.length >= count) break;
    const okChosen = chosen.every(([r, c]) => Math.abs(r - cell[0]) + Math.abs(c - cell[1]) >= minCellDist);
    const okAvoid = avoid.every(([r, c]) => Math.abs(r - cell[0]) + Math.abs(c - cell[1]) >= 2);
    if (okChosen && okAvoid) chosen.push(cell);
  }
  return chosen;
}

function buildObstacles(index, rows, info, cellSize, group, bodies) {
  activeObstacles = [];
  if (index !== 3 && index !== 4) return; // レベル1〜3には仕掛けを置かない
  const [sr, sc] = info.start;
  const [gr, gc] = info.goal;
  const avoid = [[sr, sc], [gr, gc]];
  const P = (r, c) => gridToWorld(r, c, info.h, info.w, cellSize);
  const randAxis = () => (Math.random() < 0.5 ? 'h' : 'v'); // 壁なし広場なので通路の向きに縛られずランダムでよい

  // レベル3と同じ「壁なし広場」がベースなので、外周際を除いた内側の通路セルはすべて配置候補になる
  const passage = [];
  for (let r = 1; r < info.h - 1; r++)
    for (let c = 1; c < info.w - 1; c++)
      if (rows[r][c] === '.') passage.push([r, c]);

  const notNear = (r, c, d) => avoid.every(([ar, ac]) => Math.abs(ar - r) + Math.abs(ac - c) >= d);
  // 外周のすぐ内側は場外脱出やスライド壁のはみ出しを避けるため除外
  const openCells = passage.filter(([r, c]) =>
    r >= 2 && r <= info.h - 3 && c >= 2 && c <= info.w - 3 && notNear(r, c, 3));

  if (index === 3) {
    // レベル4：フリー広場＋往復スライド壁・風ゾーン
    const walls = pickSpread(openCells, 3, 4, avoid);
    const rest = openCells.filter(cell => !walls.some(w => w[0] === cell[0] && w[1] === cell[1]));
    const winds = pickSpread(rest, 3, 3, avoid);
    for (const [r, c] of walls) {
      const { x, z } = P(r, c);
      addSlideWall(x, z, randAxis(), cellSize, group, bodies);
    }
    for (const [r, c] of winds) {
      const { x, z } = P(r, c);
      addWindZone(x, z, randAxis(), group);
    }
  } else if (index === 4) {
    // レベル5：フリー広場＋バウンドパッド・回転羽根（振り回すスペースが要るので開けたセルに置く）
    const blades = pickSpread(openCells, 3, 4, avoid);
    const rest = openCells.filter(cell => !blades.some(b => b[0] === cell[0] && b[1] === cell[1]));
    const pads = pickSpread(rest, 4, 3, avoid);
    for (const [r, c] of blades) {
      const { x, z } = P(r, c);
      addBlade(x, z, group, bodies);
    }
    for (const [r, c] of pads) {
      const { x, z } = P(r, c);
      addBouncePad(x, z, group);
    }
  }
}

// --- 往復スライド壁 ---
function addSlideWall(x, z, axis, cellSize, group, bodies) {
  const along = axis === 'h' ? { x: 1, z: 0 } : { x: 0, z: 1 };
  const crossLen = cellSize * 0.86; // 通路を横切ってふさぐ長さ
  const thick = OBST.slideWallThick;
  const h = OBST.slideWallH;
  const lenX = axis === 'h' ? thick : crossLen;
  const lenZ = axis === 'h' ? crossLen : thick;

  const geo = new THREE.BoxGeometry(lenX, h, lenZ);
  const mat = new THREE.MeshStandardMaterial({ color: 0xff8a3d, roughness: 0.6, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true; mesh.receiveShadow = true;
  mesh.position.set(x, h / 2, z);
  group.add(mesh);

  const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC, material: groundMat });
  body.addShape(new CANNON.Box(new CANNON.Vec3(lenX / 2, h / 2, lenZ / 2)));
  body.position.set(x, h / 2, z);
  world.addBody(body);
  bodies.push(body);

  const amp = cellSize * 0.55;
  const omega = OBST.slideSpeed;
  const phase0 = Math.random() * Math.PI * 2;
  const ob = {
    type: 'slideWall', x, z, t: 0,
    update(dt) {
      // 時間はdtで積算するのでフレームレートに依存しない
      ob.t += dt;
      const ph = ob.t * omega + phase0;
      const off = Math.sin(ph) * amp;
      const vel = Math.cos(ph) * amp * omega; // 位置の微分＝速度（ボールを押す力の元）
      body.position.set(x + along.x * off, h / 2, z + along.z * off);
      body.velocity.set(along.x * vel, 0, along.z * vel);
      mesh.position.copy(body.position);
    },
  };
  activeObstacles.push(ob);
}

// --- 風ゾーン ---
function addWindZone(x, z, axis, group) {
  const dir = axis === 'h'
    ? { x: Math.random() < 0.5 ? 1 : -1, z: 0 }
    : { x: 0, z: Math.random() < 0.5 ? 1 : -1 };
  const r = OBST.windZoneR;

  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(r, 32),
    new THREE.MeshBasicMaterial({ color: 0x66ccff, transparent: true, opacity: 0.28, side: THREE.DoubleSide })
  );
  disc.rotation.x = -Math.PI / 2;
  disc.position.set(x, 0.03, z);
  group.add(disc);

  // 風向きを示す細いバー
  const bar = new THREE.Mesh(
    new THREE.BoxGeometry(0.14, 0.02, r * 1.3),
    new THREE.MeshBasicMaterial({ color: 0x2aa0e0, transparent: true, opacity: 0.7 })
  );
  bar.position.set(x, 0.05, z);
  bar.rotation.y = Math.atan2(dir.x, dir.z);
  group.add(bar);

  const force = OBST.windForce;
  const ob = {
    type: 'windZone', x, z, t: 0,
    update(dt) {
      ob.t += dt;
      disc.material.opacity = 0.22 + Math.sin(ob.t * 4) * 0.08; // ゆらぎ演出
      if (gameState !== 'playing') return;
      const dx = ballBody.position.x - x, dz = ballBody.position.z - z;
      if (dx * dx + dz * dz < r * r) {
        // 相対点(0,0,0)＝重心に力を加える（ワールド座標を渡すと余計な回転が生じるため）
        ballBody.applyForce(new CANNON.Vec3(dir.x * force, 0, dir.z * force), new CANNON.Vec3(0, 0, 0));
      }
    },
  };
  activeObstacles.push(ob);
}

// --- バウンドパッド ---
function addBouncePad(x, z, group) {
  const r = OBST.bounceR;
  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(r, r, 0.12, 24),
    new THREE.MeshStandardMaterial({ color: 0x39d98a, emissive: 0x1f7d54, emissiveIntensity: 0.5, roughness: 0.4 })
  );
  mesh.position.set(x, 0.06, z);
  mesh.receiveShadow = true;
  group.add(mesh);

  const ob = {
    type: 'bounce', x, z, cool: 0, pulse: 0,
    update(dt) {
      if (ob.cool > 0) ob.cool -= dt;
      if (ob.pulse > 0) ob.pulse -= dt * 3;
      const p = Math.max(0, ob.pulse);
      const s = 1 + p * 0.4;
      mesh.scale.set(s, 1, s);
      mesh.material.emissiveIntensity = 0.5 + p * 0.8;
      if (gameState !== 'playing') return;
      const dx = ballBody.position.x - x, dz = ballBody.position.z - z;
      const near = dx * dx + dz * dz < r * r;
      const low = ballBody.position.y < BALL_R + 0.35; // 接地しているときだけ発動
      if (near && low && ob.cool <= 0) {
        const v = ballBody.velocity;
        ballBody.applyImpulse(
          new CANNON.Vec3(v.x * OBST.bounceCarry, OBST.bounceImpulse, v.z * OBST.bounceCarry),
          new CANNON.Vec3(0, 0, 0)
        );
        ob.cool = OBST.bounceCooldown;
        ob.pulse = 1;
      }
    },
  };
  activeObstacles.push(ob);
}

// --- 回転する羽根（風車） ---
function addBlade(x, z, group, bodies) {
  const armLen = OBST.bladeArmLen, armThick = OBST.bladeArmThick, armH = OBST.bladeArmH;
  const g = new THREE.Group();
  g.position.set(x, 0, z);

  const steel = new THREE.MeshStandardMaterial({ color: 0x8a94a6, metalness: 0.6, roughness: 0.4 });
  const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, armH, 16), steel);
  pillar.position.y = armH / 2; pillar.castShadow = true;
  g.add(pillar);

  const armMat = new THREE.MeshStandardMaterial({ color: 0xe8443b, metalness: 0.3, roughness: 0.5 });
  const arm = new THREE.Mesh(new THREE.BoxGeometry(armLen * 2, armH * 0.8, armThick), armMat);
  arm.position.y = armH * 0.5; arm.castShadow = true;
  g.add(arm);
  group.add(g);

  const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC, material: bladeMat });
  body.addShape(new CANNON.Box(new CANNON.Vec3(armLen, armH * 0.4, armThick / 2)));
  body.position.set(x, armH * 0.5, z);
  world.addBody(body);
  bodies.push(body);

  const omega = OBST.bladeOmega * (Math.random() < 0.5 ? 1 : -1); // 回転方向はランダム
  const ang0 = Math.random() * Math.PI * 2;
  const Yaxis = new CANNON.Vec3(0, 1, 0);
  const ob = {
    type: 'blade', x, z, t: 0,
    update(dt) {
      ob.t += dt;
      const ang = ob.t * omega + ang0;
      body.quaternion.setFromAxisAngle(Yaxis, ang);
      body.angularVelocity.set(0, omega, 0); // 接触時にボールを弾くための角速度
      g.rotation.y = ang;
    },
  };
  activeObstacles.push(ob);
}

function updateObstacles(dt) {
  for (const ob of activeObstacles) ob.update(dt);
}


let currentBeta = 0, currentGamma = 0;
let hasOrientationData = false;
let baselineBeta = 0, baselineGamma = 0;
let screenAngle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;

addEventListener('orientationchange', () => {
  screenAngle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
});

function onDeviceOrientation(e) {
  if (e.beta === null || e.gamma === null) return;
  currentBeta = e.beta;
  currentGamma = e.gamma;
  hasOrientationData = true;
}

async function requestMotionPermission() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') {
        addEventListener('deviceorientation', onDeviceOrientation);
        return true;
      }
      return false;
    } catch (err) {
      return false;
    }
  }
  addEventListener('deviceorientation', onDeviceOrientation);
  return true;
}

// キーボード（開発・確認用フォールバック）
const keys = {};
addEventListener('keydown', e => keys[e.key] = true);
addEventListener('keyup', e => keys[e.key] = false);
function keyboardTilt() {
  let x = 0, z = 0;
  if (keys['ArrowLeft'] || keys['a']) x -= 1;
  if (keys['ArrowRight'] || keys['d']) x += 1;
  if (keys['ArrowUp'] || keys['w']) z -= 1;
  if (keys['ArrowDown'] || keys['s']) z += 1;
  return { x, z };
}

let manualTilt = null; // Playwright等のテスト用に手動で傾きを注入するフック
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function updateTilt() {
  let x = 0, z = 0;
  if (manualTilt) {
    x = manualTilt.x; z = manualTilt.z;
  } else if (hasOrientationData) {
    const b = clamp(currentBeta - baselineBeta, -TILT_LIMIT_DEG, TILT_LIMIT_DEG) / TILT_LIMIT_DEG;
    const g = clamp(currentGamma - baselineGamma, -TILT_LIMIT_DEG, TILT_LIMIT_DEG) / TILT_LIMIT_DEG;
    const rad = -screenAngle * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    x = g * cos - b * sin;
    z = g * sin + b * cos;
  } else {
    const k = keyboardTilt();
    x = k.x; z = k.z;
  }
  world.gravity.set(x * MAX_TILT_G, -9.82, z * MAX_TILT_G);
}

/* ============ カメラ追従 ============ */
let camOffsetDist = 10;
const camPos = new THREE.Vector3(0, 10, 8);
function updateCamera(dt) {
  const target = ballMesh.position;
  const desired = new THREE.Vector3(target.x, camOffsetDist * 0.85, target.z + camOffsetDist * 0.55);
  const t = 1 - Math.pow(0.0008, dt);
  camPos.lerp(desired, t);
  camera.position.copy(camPos);
  camera.lookAt(target.x, 0, target.z);
}

/* ============ ゲーム状態 ============ */
let gameState = 'menu'; // 'menu' | 'countdown' | 'playing' | 'cleared'
let levelIndex = 0;
let elapsedTime = 0;
let frameCount = 0;

const menuScreen = document.getElementById('menuScreen');
const clearScreen = document.getElementById('clearScreen');
const hud = document.getElementById('hud');
const calibrateMsg = document.getElementById('calibrateMsg');
const hudLevel = document.getElementById('hudLevel');
const hudTime = document.getElementById('hudTime');
const permWarn = document.getElementById('permWarn');

function fmt(t) { return t.toFixed(1) + '秒'; }

async function startLevel(index) {
  levelIndex = index;
  const granted = await requestMotionPermission();
  if (!granted) {
    permWarn.classList.remove('hidden');
    return;
  }
  permWarn.classList.add('hidden');

  buildLevel(index);
  hudLevel.textContent = LEVELS[index].name;
  elapsedTime = 0;
  gameState = 'countdown';

  menuScreen.classList.add('hidden');
  clearScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  calibrateMsg.classList.remove('hidden');

  setTimeout(() => {
    baselineBeta = currentBeta;
    baselineGamma = currentGamma;
    calibrateMsg.classList.add('hidden');
    gameState = 'playing';
  }, 900);
}

function retryLevel() { startLevel(levelIndex); }

function onLevelClear() {
  gameState = 'cleared';
  document.getElementById('clearTime').textContent = fmt(elapsedTime);
  document.getElementById('nextBtn').classList.toggle('hidden', levelIndex >= LEVELS.length - 1);
  hud.classList.add('hidden');
  clearScreen.classList.remove('hidden');
}

function backToMenu() {
  gameState = 'menu';
  hud.classList.add('hidden');
  clearScreen.classList.add('hidden');
  calibrateMsg.classList.add('hidden');
  menuScreen.classList.remove('hidden');
}

document.querySelectorAll('[data-level]').forEach(btn => {
  btn.addEventListener('click', () => startLevel(parseInt(btn.dataset.level, 10)));
});
document.getElementById('retryBtn').addEventListener('click', retryLevel);
document.getElementById('retryBtn2').addEventListener('click', retryLevel);
document.getElementById('nextBtn').addEventListener('click', () => startLevel(levelIndex + 1));
document.getElementById('menuBtn2').addEventListener('click', backToMenu);

function checkGoal() {
  const dx = ballBody.position.x - goalWorld.x;
  const dz = ballBody.position.z - goalWorld.z;
  if (Math.sqrt(dx * dx + dz * dz) < GOAL_R) onLevelClear();
  if (ballBody.position.y < -8) {
    ballBody.position.set(startWorld.x, BALL_R + 0.05, startWorld.z);
    ballBody.velocity.set(0, 0, 0);
  }
}

/* ============ メインループ（120Hz ProMotion対応 dtクランプ） ============ */
let lastTime = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  dt = Math.min(dt, 1 / 30); // dtScale方式：スパイク・高リフレッシュレート時の暴走を防止
  frameCount++;

  goalMesh.rotation.z += dt * 1.2;
  goalMesh.position.y = 0.05 + Math.sin(now * 0.003) * 0.05;

  if (gameState === 'playing') {
    elapsedTime += dt;
    updateTilt();
    updateObstacles(dt); // 動く壁・羽根の位置更新と、風・跳ね返しの力はstep前に反映する
    world.step(1 / 60, dt, 5);
    ballMesh.position.copy(ballBody.position);
    ballMesh.quaternion.copy(ballBody.quaternion);
    updateCamera(dt);
    checkGoal();
    hudTime.textContent = fmt(elapsedTime);
  } else if (gameState === 'countdown') {
    updateObstacles(dt); // カウントダウン中も障害物は動いて見える（力はplaying時のみ作用）
    updateCamera(dt);
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

/* ============ テストフック（Playwright検証用） ============ */
window.__G = {
  get state() { return gameState; },
  get level() { return levelIndex; },
  get frames() { return frameCount; },
  get elapsed() { return elapsedTime; },
  get ballPos() {
    return { x: ballBody.position.x, y: ballBody.position.y, z: ballBody.position.z };
  },
  get goalPos() { return { x: goalWorld.x, z: goalWorld.z }; },
  get obstacleCount() { return activeObstacles.length; },
  api: {
    startLevel: (i) => startLevel(i),
    retry: () => retryLevel(),
    backToMenu: () => backToMenu(),
    // 実機の傾きセンサーを使わず、テストからボールの移動方向を直接注入する
    setTilt: (x, z) => { manualTilt = { x, z }; },
    clearTilt: () => { manualTilt = null; },
    // 現在のレベルの障害物一覧（種類と位置）を返す
    listObstacles: () => activeObstacles.map(o => ({ type: o.type, position: { x: o.x, z: o.z } })),
  },
};
</script>
