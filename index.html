<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>玉転がし迷路</title>
<!-- build: 2026-07-18 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; overscroll-behavior: none;
    touch-action: manipulation;
    background: #0d1b2a;
    font-family: 'BIZ UDPGothic', sans-serif;
    color: #fff;
    user-select: none;
  }
  canvas { display: block; touch-action: none; }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #0d1b2a 0%, #1b3a5c 100%);
    z-index: 10;
    padding: 24px;
    text-align: center;
  }
  .hidden { display: none !important; }

  h1 { font-size: clamp(24px, 6vw, 40px); margin: 0 0 8px; letter-spacing: 0.05em; }
  p.sub { opacity: 0.8; margin: 0 0 28px; font-size: clamp(13px, 3.2vw, 16px); }

  .btn {
    min-height: 54px; min-width: 220px;
    margin: 8px;
    padding: 12px 28px;
    font-size: clamp(15px, 4vw, 19px);
    font-family: inherit;
    border-radius: 14px;
    border: none;
    background: #4fd1c5;
    color: #06262b;
    font-weight: 700;
    box-shadow: 0 4px 0 #2c9b91;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #2c9b91; }
  .btn.secondary { background: #3a5a7a; color: #fff; box-shadow: 0 4px 0 #223c54; }
  .btn.secondary:active { box-shadow: 0 1px 0 #223c54; }
  .btn.small { min-width: 140px; min-height: 46px; font-size: 14px; }

  .level-list { display: flex; flex-direction: column; align-items: stretch; }
  .level-card {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; text-align: left;
  }
  .level-card .desc { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 16px; z-index: 5;
    pointer-events: none;
  }
  #hud .box {
    background: rgba(13,27,42,0.55); border-radius: 12px;
    padding: 8px 14px; font-size: 14px; backdrop-filter: blur(3px);
  }
  #hud button { pointer-events: auto; }

  #calibrateMsg {
    position: fixed; left: 0; right: 0; top: 40%;
    text-align: center; z-index: 6; pointer-events: none;
    font-size: clamp(16px, 4.5vw, 22px);
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }

  #clearBox { }
  #clearBox .time { font-size: clamp(28px, 8vw, 44px); font-weight: 700; margin: 10px 0 24px; color: #4fd1c5; }

  #permWarn { font-size: 13px; color: #ffcf6b; max-width: 320px; margin-top: 18px; }

  @media print { .screen, #hud { display: none !important; } }
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- タイトル / メニュー -->
<div id="menuScreen" class="screen">
  <h1>玉転がし迷路</h1>
  <p class="sub">iPadを傾けてボールをゴールまで運ぼう</p>
  <div class="level-list">
    <button class="btn level-card" data-level="0">
      <span><strong>レベル1</strong><div class="desc">まっすぐシンプル</div></span>
      <span>▶</span>
    </button>
    <button class="btn level-card" data-level="1">
      <span><strong>レベル2</strong><div class="desc">ジグザグコース</div></span>
      <span>▶</span>
    </button>
    <button class="btn level-card" data-level="2">
      <span><strong>レベル3</strong><div class="desc">フリーコース（壁なし）</div></span>
      <span>▶</span>
    </button>
  </div>
  <div id="permWarn" class="hidden">傾きセンサーの利用が許可されていません。iPadの設定でモーションとオリエンテーションのアクセスを許可してから、もう一度お試しください。</div>
</div>

<!-- ゲーム中HUD -->
<div id="hud" class="hidden">
  <div class="box" id="hudLevel">レベル1</div>
  <div class="box" id="hudTime">0.0秒</div>
  <div class="box"><button class="btn small secondary" id="retryBtn">やりなおす</button></div>
</div>
<div id="calibrateMsg" class="hidden">iPadを平らに持って、少し待ってください…</div>

<!-- クリア画面 -->
<div id="clearScreen" class="screen hidden">
  <h1 id="clearBox">ゴール！</h1>
  <div class="time" id="clearTime">0.0秒</div>
  <button class="btn" id="nextBtn">次のレベルへ</button>
  <button class="btn secondary" id="retryBtn2">もう一度</button>
  <button class="btn secondary" id="menuBtn2">メニューへ</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.166.0/build/three.module.js",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

/* ============ iPad ダブルタップズーム / ピンチ / バウンス防止 ============ */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

/* ============ 定数 ============ */
const CELL = 2;
const WALL_H = 1.6;
const WALL_T = 0.4;   // 壁の厚み（薄くして通路を広く見せる）
const BALL_R = 0.55;  // ボール半径（大きめ）
const GOAL_R = 0.7;
const MAX_TILT_G = 6.2;
const TILT_LIMIT_DEG = 24;

/* ============ レベルデータ ============ */
// '#'=壁 '.'=通路 'S'=スタート 'G'=ゴール
const LEVEL1_ROWS = [
  "###########",
  "#S.......G#",
  "###########",
];

const LEVEL2_ROWS = [
  "#########",
  "#S......#",
  "#######.#",
  "#.......#",
  "#.#######",
  "#......G#",
  "#########",
];

function buildFreeLevel(h, w) {
  // 外周だけ壁、内部はすべて通路の自由な広場
  const g = Array.from({ length: h }, (_, r) =>
    Array.from({ length: w }, (_, c) =>
      (r === 0 || r === h - 1 || c === 0 || c === w - 1) ? '#' : '.'
    )
  );
  g[1][1] = 'S';
  g[h - 2][w - 2] = 'G';
  return g.map(row => row.join(''));
}
const LEVEL3_ROWS = buildFreeLevel(9, 13);

const LEVELS = [
  { name: 'レベル1：シンプル', rows: LEVEL1_ROWS },
  { name: 'レベル2：ジグザグ', rows: LEVEL2_ROWS },
  { name: 'レベル3：フリー', rows: LEVEL3_ROWS },
];

function parseLevel(rows) {
  const h = rows.length, w = rows[0].length;
  let start = null, goal = null;
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const ch = rows[r][c];
      if (ch === 'S') start = [r, c];
      if (ch === 'G') goal = [r, c];
    }
  }
  const isWall = (r, c) => {
    if (r < 0 || r >= h || c < 0 || c >= w) return true; // 範囲外は壁扱い
    return rows[r][c] === '#';
  };
  return { h, w, isWall, start, goal };
}
function gridToWorld(r, c, h, w) {
  return {
    x: (c - (w - 1) / 2) * CELL,
    z: (r - (h - 1) / 2) * CELL,
  };
}

/* ============ Three.js セットアップ ============ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd8e8);
scene.fog = new THREE.Fog(0x9fd8e8, 18, 46);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);

const hemi = new THREE.HemisphereLight(0xffffff, 0x445566, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(6, 12, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 40;
sun.shadow.camera.left = -14; sun.shadow.camera.right = 14;
sun.shadow.camera.top = 14; sun.shadow.camera.bottom = -14;
scene.add(sun);

function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

/* ============ Cannon-es セットアップ ============ */
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;

const groundMat = new CANNON.Material('ground');
const ballMat = new CANNON.Material('ball');
world.addContactMaterial(new CANNON.ContactMaterial(groundMat, ballMat, {
  friction: 0.45, restitution: 0.15,
}));

/* ============ ボール ============ */
const ballGeo = new THREE.SphereGeometry(BALL_R, 32, 24);
const ballTexMat = new THREE.MeshStandardMaterial({ color: 0xff5252, metalness: 0.35, roughness: 0.35 });
const ballMesh = new THREE.Mesh(ballGeo, ballTexMat);
ballMesh.castShadow = true;
scene.add(ballMesh);

const ballBody = new CANNON.Body({
  mass: 1,
  shape: new CANNON.Sphere(BALL_R),
  material: ballMat,
  linearDamping: 0.35,
  angularDamping: 0.2,
});
world.addBody(ballBody);

/* ============ ゴールマーカー ============ */
const goalGeo = new THREE.TorusGeometry(GOAL_R, 0.08, 12, 32);
const goalMat = new THREE.MeshStandardMaterial({ color: 0xffd23f, emissive: 0xffb800, emissiveIntensity: 0.6 });
const goalMesh = new THREE.Mesh(goalGeo, goalMat);
goalMesh.rotation.x = Math.PI / 2;
scene.add(goalMesh);

/* ============ レベル構築 ============ */
let currentLevelGroup = null;
let currentLevelInfo = null;
let goalWorld = { x: 0, z: 0 };
let startWorld = { x: 0, z: 0 };

function clearLevel() {
  if (currentLevelGroup) {
    scene.remove(currentLevelGroup);
    currentLevelGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); });
  }
  if (currentLevelInfo) {
    currentLevelInfo.bodies.forEach(b => world.removeBody(b));
  }
}

function buildLevel(index) {
  clearLevel();
  const { rows } = LEVELS[index];
  const info = parseLevel(rows);
  const group = new THREE.Group();
  const bodies = [];

  // 床
  const floorW = info.w * CELL, floorH = info.h * CELL;
  const floorGeo = new THREE.BoxGeometry(floorW, 0.4, floorH);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x2f7d5b, roughness: 0.9 });
  const floorMesh = new THREE.Mesh(floorGeo, floorMat);
  floorMesh.position.set(0, -0.2, 0);
  floorMesh.receiveShadow = true;
  group.add(floorMesh);

  const floorBody = new CANNON.Body({ mass: 0, material: groundMat });
  floorBody.addShape(new CANNON.Box(new CANNON.Vec3(floorW / 2, 0.2, floorH / 2)));
  floorBody.position.set(0, -0.2, 0);
  world.addBody(floorBody);
  bodies.push(floorBody);

  // 壁：セルを塗りつぶすのではなく、通路と壁の「境界線」に薄い板を置く方式
  const wallSegs = [];
  for (let r = 0; r < info.h; r++) {
    for (let c = 0; c < info.w; c++) {
      if (rows[r][c] === '#') continue; // 通路セル側からのみ境界を判定する
      const { x, z } = gridToWorld(r, c, info.h, info.w);
      // 角に隙間ができないよう、境界壁の長さをWALL_T分だけ延長して重ねる
      if (info.isWall(r - 1, c)) wallSegs.push({ x, z: z - CELL / 2, lenX: CELL + WALL_T, lenZ: WALL_T }); // 北
      if (info.isWall(r + 1, c)) wallSegs.push({ x, z: z + CELL / 2, lenX: CELL + WALL_T, lenZ: WALL_T }); // 南
      if (info.isWall(r, c - 1)) wallSegs.push({ x: x - CELL / 2, z, lenX: WALL_T, lenZ: CELL + WALL_T }); // 西
      if (info.isWall(r, c + 1)) wallSegs.push({ x: x + CELL / 2, z, lenX: WALL_T, lenZ: CELL + WALL_T }); // 東
    }
  }
  if (wallSegs.length > 0) {
    const wallGeo = new THREE.BoxGeometry(1, 1, 1); // 単位ボックス。インスタンスごとにスケールして使う
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xeee6d5, roughness: 0.85 });
    const wallMesh = new THREE.InstancedMesh(wallGeo, wallMat, wallSegs.length);
    wallMesh.castShadow = true;
    wallMesh.receiveShadow = true;
    const dummy = new THREE.Object3D();
    wallSegs.forEach((seg, i) => {
      dummy.position.set(seg.x, WALL_H / 2, seg.z);
      dummy.scale.set(seg.lenX, WALL_H, seg.lenZ);
      dummy.updateMatrix();
      wallMesh.setMatrixAt(i, dummy.matrix);

      const body = new CANNON.Body({ mass: 0, material: groundMat });
      body.addShape(new CANNON.Box(new CANNON.Vec3(seg.lenX / 2, WALL_H / 2, seg.lenZ / 2)));
      body.position.set(seg.x, WALL_H / 2, seg.z);
      world.addBody(body);
      bodies.push(body);
    });
    group.add(wallMesh);
  }

  scene.add(group);
  currentLevelGroup = group;
  currentLevelInfo = { ...info, bodies };

  startWorld = gridToWorld(info.start[0], info.start[1], info.h, info.w);
  goalWorld = gridToWorld(info.goal[0], info.goal[1], info.h, info.w);
  goalMesh.position.set(goalWorld.x, 0.05, goalWorld.z);

  ballBody.position.set(startWorld.x, BALL_R + 0.05, startWorld.z);
  ballBody.velocity.set(0, 0, 0);
  ballBody.angularVelocity.set(0, 0, 0);
  ballBody.quaternion.set(0, 0, 0, 1);

  // カメラの見下ろし距離をコース規模に合わせる
  camOffsetDist = Math.max(8, Math.max(floorW, floorH) * 0.55);
}

/* ============ 傾き制御 ============ */
let currentBeta = 0, currentGamma = 0;
let hasOrientationData = false;
let baselineBeta = 0, baselineGamma = 0;
let screenAngle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;

addEventListener('orientationchange', () => {
  screenAngle = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
});

function onDeviceOrientation(e) {
  if (e.beta === null || e.gamma === null) return;
  currentBeta = e.beta;
  currentGamma = e.gamma;
  hasOrientationData = true;
}

async function requestMotionPermission() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') {
        addEventListener('deviceorientation', onDeviceOrientation);
        return true;
      }
      return false;
    } catch (err) {
      return false;
    }
  }
  addEventListener('deviceorientation', onDeviceOrientation);
  return true;
}

// キーボード（開発・確認用フォールバック）
const keys = {};
addEventListener('keydown', e => keys[e.key] = true);
addEventListener('keyup', e => keys[e.key] = false);
function keyboardTilt() {
  let x = 0, z = 0;
  if (keys['ArrowLeft'] || keys['a']) x -= 1;
  if (keys['ArrowRight'] || keys['d']) x += 1;
  if (keys['ArrowUp'] || keys['w']) z -= 1;
  if (keys['ArrowDown'] || keys['s']) z += 1;
  return { x, z };
}

let manualTilt = null; // Playwright等のテスト用に手動で傾きを注入するフック
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function updateTilt() {
  let x = 0, z = 0;
  if (manualTilt) {
    x = manualTilt.x; z = manualTilt.z;
  } else if (hasOrientationData) {
    const b = clamp(currentBeta - baselineBeta, -TILT_LIMIT_DEG, TILT_LIMIT_DEG) / TILT_LIMIT_DEG;
    const g = clamp(currentGamma - baselineGamma, -TILT_LIMIT_DEG, TILT_LIMIT_DEG) / TILT_LIMIT_DEG;
    const rad = -screenAngle * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    x = g * cos - b * sin;
    z = g * sin + b * cos;
  } else {
    const k = keyboardTilt();
    x = k.x; z = k.z;
  }
  world.gravity.set(x * MAX_TILT_G, -9.82, z * MAX_TILT_G);
}

/* ============ カメラ追従 ============ */
let camOffsetDist = 10;
const camPos = new THREE.Vector3(0, 10, 8);
function updateCamera(dt) {
  const target = ballMesh.position;
  const desired = new THREE.Vector3(target.x, camOffsetDist * 0.85, target.z + camOffsetDist * 0.55);
  const t = 1 - Math.pow(0.0008, dt);
  camPos.lerp(desired, t);
  camera.position.copy(camPos);
  camera.lookAt(target.x, 0, target.z);
}

/* ============ ゲーム状態 ============ */
let gameState = 'menu'; // 'menu' | 'countdown' | 'playing' | 'cleared'
let levelIndex = 0;
let elapsedTime = 0;
let frameCount = 0;

const menuScreen = document.getElementById('menuScreen');
const clearScreen = document.getElementById('clearScreen');
const hud = document.getElementById('hud');
const calibrateMsg = document.getElementById('calibrateMsg');
const hudLevel = document.getElementById('hudLevel');
const hudTime = document.getElementById('hudTime');
const permWarn = document.getElementById('permWarn');

function fmt(t) { return t.toFixed(1) + '秒'; }

async function startLevel(index) {
  levelIndex = index;
  const granted = await requestMotionPermission();
  if (!granted) {
    permWarn.classList.remove('hidden');
    return;
  }
  permWarn.classList.add('hidden');

  buildLevel(index);
  hudLevel.textContent = LEVELS[index].name;
  elapsedTime = 0;
  gameState = 'countdown';

  menuScreen.classList.add('hidden');
  clearScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  calibrateMsg.classList.remove('hidden');

  setTimeout(() => {
    baselineBeta = currentBeta;
    baselineGamma = currentGamma;
    calibrateMsg.classList.add('hidden');
    gameState = 'playing';
  }, 900);
}

function retryLevel() { startLevel(levelIndex); }

function onLevelClear() {
  gameState = 'cleared';
  document.getElementById('clearTime').textContent = fmt(elapsedTime);
  document.getElementById('nextBtn').classList.toggle('hidden', levelIndex >= LEVELS.length - 1);
  hud.classList.add('hidden');
  clearScreen.classList.remove('hidden');
}

function backToMenu() {
  gameState = 'menu';
  hud.classList.add('hidden');
  clearScreen.classList.add('hidden');
  calibrateMsg.classList.add('hidden');
  menuScreen.classList.remove('hidden');
}

document.querySelectorAll('[data-level]').forEach(btn => {
  btn.addEventListener('click', () => startLevel(parseInt(btn.dataset.level, 10)));
});
document.getElementById('retryBtn').addEventListener('click', retryLevel);
document.getElementById('retryBtn2').addEventListener('click', retryLevel);
document.getElementById('nextBtn').addEventListener('click', () => startLevel(levelIndex + 1));
document.getElementById('menuBtn2').addEventListener('click', backToMenu);

function checkGoal() {
  const dx = ballBody.position.x - goalWorld.x;
  const dz = ballBody.position.z - goalWorld.z;
  if (Math.sqrt(dx * dx + dz * dz) < GOAL_R) onLevelClear();
  if (ballBody.position.y < -8) {
    ballBody.position.set(startWorld.x, BALL_R + 0.05, startWorld.z);
    ballBody.velocity.set(0, 0, 0);
  }
}

/* ============ メインループ（120Hz ProMotion対応 dtクランプ） ============ */
let lastTime = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  dt = Math.min(dt, 1 / 30); // dtScale方式：スパイク・高リフレッシュレート時の暴走を防止
  frameCount++;

  goalMesh.rotation.z += dt * 1.2;
  goalMesh.position.y = 0.05 + Math.sin(now * 0.003) * 0.05;

  if (gameState === 'playing') {
    elapsedTime += dt;
    updateTilt();
    world.step(1 / 60, dt, 5);
    ballMesh.position.copy(ballBody.position);
    ballMesh.quaternion.copy(ballBody.quaternion);
    updateCamera(dt);
    checkGoal();
    hudTime.textContent = fmt(elapsedTime);
  } else if (gameState === 'countdown') {
    updateCamera(dt);
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

/* ============ テストフック（Playwright検証用） ============ */
window.__G = {
  get state() { return gameState; },
  get level() { return levelIndex; },
  get frames() { return frameCount; },
  get elapsed() { return elapsedTime; },
  get ballPos() {
    return { x: ballBody.position.x, y: ballBody.position.y, z: ballBody.position.z };
  },
  get goalPos() { return { x: goalWorld.x, z: goalWorld.z }; },
  api: {
    startLevel: (i) => startLevel(i),
    retry: () => retryLevel(),
    backToMenu: () => backToMenu(),
    // 実機の傾きセンサーを使わず、テストからボールの移動方向を直接注入する
    setTilt: (x, z) => { manualTilt = { x, z }; },
    clearTilt: () => { manualTilt = null; },
  },
};
</script>
</body>
</html>
